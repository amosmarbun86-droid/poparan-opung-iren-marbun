<!DOCTYPE html>
<html>
<head>
  <title>Poparan Opung Iren Marbun (Vertical)</title>
  <script src="https://d3js.org/d3.v7.min.js"></script>

  <style>
    body {
  font-family: Arial, sans-serif;
  background: linear-gradient(135deg, #e3f2fd, #ffffff);
  margin: 0;
  padding: 20px;
}

h2 {
  color: #333;
  text-align: center; /* 🔥 biar lebih rapi */
}

/* layout jadi atas-bawah */
.container {
  display: block;
}

/* form */
.form-box {
  background: white;
  padding: 20px;
  border-radius: 12px;
  width: 100%;
  max-width: 500px;
  margin: 0 auto 15px; /* 🔥 center + jarak bawah */
  box-shadow: 0 4px 10px rgba(0,0,0,0.1);
}

.form-box input, 
.form-box select {
  width: 100%;
  padding: 8px;
  margin-bottom: 10px;
  border-radius: 6px;
  border: 1px solid #ccc;
}

.form-box button {
  width: 100%;
  padding: 10px;
  background: #4CAF50;
  color: white;
  border: none;
  border-radius: 6px;
  cursor: pointer;
}

/* tree */
.tree-box {
  width: 100%; /* 🔥 pastikan full */
  height: calc(100vh - 220px); /* 🔥 disesuaikan karena form di atas */
  overflow: auto;
  -webkit-overflow-scrolling: touch;
  background: white; /* 🔥 biar beda dari background */
  border-radius: 12px;
  padding: 10px;
}

#tree svg {
  min-width: 600px;
}

#tree {
  width: 100%;
  height: 100%;
}
 .modal {
  display: none; /* awalnya hidden */
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: rgba(0,0,0,0.5);

  justify-content: center;
  align-items: center;
}

.modal-content {
  background: white;
  padding: 20px;
  border-radius: 10px;
  width: 300px;
}
  .delete {
  background: #e53935;
  color: white;
  }
  </style>
</head>

<body>

<h2>🌳 Poparan Opung Iren Marbun (Vertical)</h2>

<div class="container">

<div class="form-box">
  <h3>Tambah Anggota</h3>

  <input id="name" placeholder="Nama">
  <input id="birth" type="date">

  <select id="father">
    <option value="">-- Pilih Ayah --</option>
  </select>

  <button onclick="addPerson()">Tambah</button>

  <!-- ✅ Tambahkan di sini -->
  <button onclick="openModalTest()">Test Modal</button>

  </div>

  <div class="tree-box">
    <div id="tree"></div>
  </div>

</div> <!-- ✅ WAJIB ditutup -->

<!-- ✅ Modal taruh di luar container -->
<div id="modal" class="modal">
  <div class="modal-content">
    <h3>Edit Data</h3>

    <input id="editName" placeholder="Nama">
    <input id="editBirth" type="date">

    <div class="modal-actions">
  <button onclick="saveEdit()">Simpan</button>
  <button onclick="deleteFromModal()" class="delete">Hapus</button>
  <button onclick="closeModal()" class="cancel">Batal</button>
    </div>
  </div>
</div>
  
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-app.js";
import { 
  getFirestore, 
  collection, 
  addDoc, 
  getDocs,
  deleteDoc,
  doc,
  updateDoc
} from "https://www.gstatic.com/firebasejs/10.7.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyAwb3uKq12i0VKYQnLfpmFnOUyosbcJXUI",
  authDomain: "poparan-opung-iren-marbun.firebaseapp.com",
  projectId: "poparan-opung-iren-marbun"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);


// 🗑️ HAPUS
window.deletePerson = async function(id) {
  if (confirm("Hapus data?")) {
    await deleteDoc(doc(db, "people", id));
    loadTree();
    loadFatherOptions();
  }
};
// ✏️ EDIT
let currentEditId = null;

window.editPerson = function(id, oldName, oldBirth) {
  currentEditId = id;

  document.getElementById("editName").value = oldName || "";
  document.getElementById("editBirth").value = oldBirth || "";

  document.getElementById("modal").style.display = "flex";
};
window.saveEdit = async function() {
  const name = document.getElementById("editName").value.trim();
  const birth = document.getElementById("editBirth").value;

  if (!name) {
    alert("Nama wajib diisi");
    return;
  }

  try {
    await updateDoc(doc(db, "people", currentEditId), {
      name,
      birth_date: birth
    });

    alert("Data berhasil diupdate ✅");

    closeModal();
    loadTree();
    loadFatherOptions();

  } catch (err) {
    console.error(err);
    alert("Gagal update data ❌");
  }
};
  window.addPerson = async function() {
  const name = nameEl.value.trim();
  const birth = birthEl.value;
  const father = fatherEl.value;

  if (!name) {
    alert("Nama wajib diisi");
    return;
  }

  if (!birth) {
    alert("Tanggal lahir wajib diisi");
    return;
  }

  try {
    await addDoc(collection(db, "people"), {
      name,
      birth_date: birth,
      father_id: father || null
    });

    nameEl.value = "";
    birthEl.value = "";
    fatherEl.value = "";

    alert("Berhasil ditambahkan ✅");

    loadTree();
    loadFatherOptions();
  } catch (err) {
    console.error(err);
    alert("Gagal menyimpan data ❌");
  }
};

// 📥 GET DATA
async function getPeople() {
  const snapshot = await getDocs(collection(db, "people"));
  let people = [];

  snapshot.forEach(doc => {
    people.push({ id: doc.id, ...doc.data() });
  });

  people.sort((a, b) => new Date(a.birth_date) - new Date(b.birth_date));
  return people;
}

// 🌳 BUILD TREE (tetap versi kamu)
function buildTree(people) {
  let map = {}, root = null;

  people.forEach(p => map[p.id] = { ...p, children: [] });

  people.forEach(p => {
    if (p.father_id && map[p.father_id]) {
      map[p.father_id].children.push(map[p.id]);
    } else {
      root = map[p.id];
    }
  });

  function addOrder(node) {
    node.children.forEach((c, i) => {
      c.orderLabel = `Anak ke-${i+1}`;
      addOrder(c);
    });
  }

  if (root) addOrder(root);
  return root;
}

function drawTree(data) {
  const container = document.getElementById("tree");
  container.innerHTML = "";

  const rect = container.getBoundingClientRect();
  const width = rect.width;

  const root = d3.hierarchy(data);

  const nodeCount = root.descendants().length;
  const height = Math.max(600, nodeCount * 100);

  const svg = d3.select("#tree")
    .append("svg")
    .attr("width", width)
    .attr("height", height);

  const g = svg.append("g");

  svg.call(
    d3.zoom()
      .scaleExtent([0.5, 2])
      .on("zoom", (event) => {
        g.attr("transform", event.transform);
      })
  );

  const treeLayout = d3.tree().size([width - 40, height - 40]);
  treeLayout(root);

  root.descendants().forEach(d => {
    d.x += 20;
    d.y += 20;
  });

  // ======================
  // LINKS
  // ======================
  g.selectAll("path")
    .data(root.links())
    .enter()
    .append("path")
    .attr("fill", "none")
    .attr("stroke", "#90caf9")
    .attr("stroke-width", 2)
    .attr("d", d => `
      M${d.source.x},${d.source.y}
      C${d.source.x},${(d.source.y + d.target.y)/2}
       ${d.target.x},${(d.source.y + d.target.y)/2}
       ${d.target.x},${d.target.y}
    `);

  // ======================
  // NODES
  // ======================
  const nodes = g.selectAll("g")
    .data(root.descendants())
    .enter()
    .append("g")
    .attr("transform", d => `translate(${d.x}, ${d.y})`);

  // hover effect
  nodes.on("mouseenter", function () {
    d3.select(this).select("rect")
      .attr("stroke", "#1e88e5")
      .attr("stroke-width", 3);
  });

  nodes.on("mouseleave", function () {
    d3.select(this).select("rect")
      .attr("stroke", "#90caf9")
      .attr("stroke-width", 1);
  });

  const node = nodes;

  // BOX
  node.append("rect")
    .attr("x", -70)
    .attr("y", -30)
    .attr("width", 140)
    .attr("height", 60)
    .attr("rx", 12)
    .attr("fill", "#fff")
    .attr("stroke", "#90caf9");

  // NAME
  node.append("text")
    .attr("dy", -5)
    .attr("text-anchor", "middle")
    .style("font-weight", "bold")
    .style("font-size", "13px")
    .text(d => d.data.name);

  // EDIT ICON
  node.append("text")
    .attr("x", -45)
    .attr("y", 20)
    .style("cursor", "pointer")
    .style("font-size", "16px")
    .text("✏️")
    .on("click", (event, d) => {
      event.stopPropagation();
      editPerson(d.data.id, d.data.name, d.data.birth_date);
    });

  // DELETE ICON
  node.append("text")
    .attr("x", 45)
    .attr("y", 20)
    .style("cursor", "pointer")
    .style("font-size", "16px")
    .text("🗑")
    .on("click", (event, d) => {
      event.stopPropagation();
      deletePerson(d.data.id);
    });

  // LABEL
  node.append("text")
    .attr("dy", 25)
    .attr("text-anchor", "middle")
    .style("font-size", "10px")
    .style("fill", "#666")
    .text(d => d.data.orderLabel || "");

  // animation
  nodes.style("opacity", 0)
    .transition()
    .duration(400)
    .style("opacity", 1);

}

// dropdown
async function loadFatherOptions() {
  const people = await getPeople();
  const select = document.getElementById("father");

  select.innerHTML = '<option value="">-- Pilih Ayah --</option>';

  people.forEach(p => {
    const o = document.createElement("option");
    o.value = p.id;
    o.text = p.name;
    select.appendChild(o);
  });
}

// load
async function loadTree() {
  const people = await getPeople();
  const treeData = buildTree(people);
  if (treeData) drawTree(treeData);
}

const nameEl = document.getElementById("name");
const birthEl = document.getElementById("birth");
const fatherEl = document.getElementById("father");

loadTree();
loadFatherOptions();

// buka modal (test)
function openModalTest() {
  document.getElementById("modal").style.display = "flex";
}

// tutup modal
function closeModal() {
  document.getElementById("modal").style.display = "none";
}

// ✅ DELETE HARUS DI LUAR
async function deleteFromModal() {
  if (!currentEditId) return;

  if (!confirm("Yakin mau hapus data ini?")) return;

  try {
    await deleteDoc(doc(db, "people", currentEditId));

    alert("Data berhasil dihapus 🗑️");

    closeModal();
    loadTree();
    loadFatherOptions();

  } catch (err) {
    console.error(err);
    alert("Gagal menghapus ❌");
  }
}

// klik luar modal
window.onclick = function(event) {
  const modal = document.getElementById("modal");

  if (event.target === modal) {
    closeModal();
  }
};

</script>

</body>
</html>
