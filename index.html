<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<title>Poparan Opung Iren Marbun</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<!-- FONT ADAT -->
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@500&display=swap" rel="stylesheet">

<script src="https://d3js.org/d3.v7.min.js"></script>

<style>
body {
  margin: 0;
  padding: 10px;
  font-family: 'Cinzel', serif;
  overflow-x: hidden;
}

/* 🌺 BACKGROUND ULOS (TETAP) */
body::before {
  content: "";
  position: fixed;
  top: -50%;
  left: -50%;
  width: 200%;
  height: 200%;
  background-image: url("https://www.transparenttextures.com/patterns/black-felt.png");
  background-color: #8B0000;
  opacity: 0.25;
  z-index: -2;
  animation: kainGerak 12s ease-in-out infinite alternate;
}

body::after {
  content: "";
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: rgba(255, 248, 240, 0.92);
  z-index: -1;
}

@keyframes kainGerak {
  0% { transform: translate(0,0) rotate(0deg); }
  50% { transform: translate(-30px,20px) rotate(1deg); }
  100% { transform: translate(20px,-30px) rotate(-1deg); }
}

/* HEADER */
.header {
  text-align: center;
  margin-bottom: 15px;
}
.header h2 {
  margin: 0;
  color: #8B0000;
}

/* FORM */
.form-box {
  background: #fff;
  padding: 15px;
  border-radius: 12px;
  border: 2px solid #8B0000;
}
.form-box input, .form-box select {
  width: 100%;
  padding: 10px;
  margin-bottom: 10px;
}
.form-box button {
  width: 100%;
  padding: 12px;
  background: #8B0000;
  color: white;
  border: none;
}

/* TREE */
.tree-box {
  background: #fff;
  border-radius: 12px;
  padding: 10px;
  border: 2px solid #8B0000;
  overflow: auto;
  max-height: 80vh;
}
#tree svg {
  touch-action: none;
}

/* NODE */
.node-box {
  fill: #fff8f0;
  stroke: #8B0000;
  stroke-width: 2;
  rx: 12;
}

/* POPUP */
#popup {
  position: fixed;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  background: white;
  padding: 20px;
  border-radius: 10px;
  display: none;
  z-index: 999;
}
</style>
</head>

<body>

<div class="header">
  <h2>🌳 Poparan Opung Iren Marbun</h2>
</div>

<div class="form-box">
  <input id="name" placeholder="Nama">
  <input id="birth" type="date">

  <select id="father">
    <option value="">-- Pilih Ayah --</option>
  </select>

  <button onclick="addPerson()">Tambah</button>
</div>

<div class="tree-box">
  <div id="tree"></div>
</div>

<div id="popup"></div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-app.js";
import {
  getFirestore, collection, addDoc, getDocs,
  deleteDoc, doc, updateDoc
} from "https://www.gstatic.com/firebasejs/10.7.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSy...",
  authDomain: "poparan-opung-iren-marbun.firebaseapp.com",
  projectId: "poparan-opung-iren-marbun"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

/* ================= ADD ================= */
window.addPerson = async function(){
  const name = nameInput.value;
  const birth = birthInput.value;
  const father = fatherInput.value;

  if(!name) return alert("Nama wajib diisi");

  await addDoc(collection(db,"people"),{
    name,
    birth_date: birth,
    father_id: father || null
  });

  nameInput.value="";
  birthInput.value="";
  fatherInput.value="";

  loadAll();
}

/* ================= DELETE ================= */
window.deletePerson = async function(id){
  if(confirm("Hapus data?")){
    await deleteDoc(doc(db,"people",id));
    loadAll();
  }
}

/* ================= EDIT ================= */
window.editPerson = async function(id,name,birth){
  const n = prompt("Nama:",name);
  const b = prompt("Tanggal:",birth);

  if(n){
    await updateDoc(doc(db,"people",id),{
      name:n,
      birth_date:b
    });
    loadAll();
  }
}

/* ================= GET DATA ================= */
async function getPeople(){
  const snap = await getDocs(collection(db,"people"));
  let arr=[];
  snap.forEach(d=>arr.push({id:d.id,...d.data()}));
  arr.sort((a,b)=> new Date(a.birth_date)-new Date(b.birth_date));
  return arr;
}

/* ================= BUILD TREE ================= */
function buildTree(data){
  let map={};
  let roots=[];

  data.forEach(p=>map[p.id]={...p,children:[]});

  data.forEach(p=>{
    if(p.father_id && map[p.father_id]){
      map[p.father_id].children.push(map[p.id]);
    }else{
      roots.push(map[p.id]);
    }
  });

  return roots.length===1 ? roots[0] : {name:"ROOT",children:roots};
}

/* ================= DRAW TREE (V2 ENGINE) ================= */
function drawTree(data){
  document.getElementById("tree").innerHTML="";

  const width = Math.max(window.innerWidth, 900);
  const height = Math.max(window.innerHeight, 600);

  const svg = d3.select("#tree")
    .append("svg")
    .attr("width", width)
    .attr("height", height)
    .call(
      d3.zoom().scaleExtent([0.5,2])
      .on("zoom",(event)=>{
        g.attr("transform", event.transform);
      })
    );

  const g = svg.append("g")
    .attr("transform","translate(80,50)");

  const root = d3.hierarchy(data);

  const treeLayout = d3.tree().size([height - 100, width - 200]);
  treeLayout(root);

  /* LINK */
  g.selectAll("path")
    .data(root.links())
    .enter()
    .append("path")
    .attr("fill","none")
    .attr("stroke","#8B0000")
    .attr("stroke-width",2)
    .attr("d", d => `
      M${d.source.y},${d.source.x}
      C${(d.source.y + d.target.y)/2},${d.source.x}
       ${(d.source.y + d.target.y)/2},${d.target.x}
       ${d.target.y},${d.target.x}
    `);

  /* NODE */
  const nodes = g.selectAll("g.node")
    .data(root.descendants())
    .enter()
    .append("g")
    .attr("transform", d=>`translate(${d.y},${d.x})`);

  const boxWidth = window.innerWidth < 500 ? 150 : 120;
  const boxHeight = 55;

  nodes.append("rect")
    .attr("class","node-box")
    .attr("x",-boxWidth/2)
    .attr("y",-boxHeight/2)
    .attr("width",boxWidth)
    .attr("height",boxHeight)
    .on("click",(e,d)=>showPopup(d.data));

  nodes.append("text")
    .attr("text-anchor","middle")
    .attr("dy","-5")
    .style("font-weight","bold")
    .text(d=>d.data.name);

  nodes.append("text")
    .attr("text-anchor","middle")
    .attr("dy","10")
    .style("font-size","10px")
    .text(d=>d.data.orderLabel || "");

  nodes.append("text")
    .attr("dy","22")
    .attr("text-anchor","middle")
    .text("✏️")
    .on("click",(e,d)=>{
      e.stopPropagation();
      editPerson(d.data.id,d.data.name,d.data.birth_date);
    });

  nodes.append("text")
    .attr("dy","35")
    .attr("text-anchor","middle")
    .text("🗑️")
    .on("click",(e,d)=>{
      e.stopPropagation();
      deletePerson(d.data.id);
    });
}

/* ================= POPUP ================= */
function showPopup(data){
  const p = document.getElementById("popup");
  p.style.display="block";
  p.innerHTML=`
    <h3>${data.name}</h3>
    <p>Tanggal Lahir: ${data.birth_date || "-"}</p>
    <button onclick="document.getElementById('popup').style.display='none'">Tutup</button>
  `;
}

/* ================= DROPDOWN ================= */
async function loadFather(){
  const data = await getPeople();
  fatherInput.innerHTML='<option value="">-- Pilih Ayah --</option>';

  data.forEach(p=>{
    const o=document.createElement("option");
    o.value=p.id;
    o.text=p.name;
    fatherInput.appendChild(o);
  });
}

/* ================= LOAD ================= */
async function loadAll(){
  const data = await getPeople();
  const tree = buildTree(data);
  if(tree) drawTree(tree);
  loadFather();
}

const nameInput=document.getElementById("name");
const birthInput=document.getElementById("birth");
const fatherInput=document.getElementById("father");

loadAll();
</script>

</body>
</html>
