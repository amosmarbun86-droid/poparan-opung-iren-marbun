<!DOCTYPE html>
<html>
<head>
  <title>Poparan Opung Iren Marbun</title>
  <script src="https://d3js.org/d3.v7.min.js"></script>
</head>
<body>

<h2>Tambah Anggota Keluarga</h2>

<input id="name" placeholder="Nama"><br>
<input id="birth" type="date"><br>

<select id="father">
  <option value="">-- Pilih Ayah (Root jika kosong) --</option>
</select><br><br>

<button onclick="addPerson()">Tambah</button>

<h2>Pohon Keluarga</h2>
<div id="tree"></div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-app.js";
import { 
  getFirestore, 
  collection, 
  addDoc, 
  getDocs,
  deleteDoc,
  doc,
  updateDoc
} from "https://www.gstatic.com/firebasejs/10.7.0/firebase-firestore.js";

// 🔥 CONFIG FIREBASE
const firebaseConfig = {
  apiKey: "AIzaSyAwb3uKq12i0VKYQnLfpmFnOUyosbcJXUI",
  authDomain: "poparan-opung-iren-marbun.firebaseapp.com",
  projectId: "poparan-opung-iren-marbun"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

// ➕ TAMBAH DATA
window.addPerson = async function() {
  const name = document.getElementById("name").value;
  const birth = document.getElementById("birth").value;
  const father = document.getElementById("father").value;

  await addDoc(collection(db, "people"), {
    name: name,
    birth_date: birth,
    father_id: father || null
  });

  alert("Data berhasil ditambahkan!");

  loadTree();
  loadFatherOptions();
};

// 🗑️ HAPUS DATA
window.deletePerson = async function(id) {
  if (confirm("Yakin mau hapus?")) {
    await deleteDoc(doc(db, "people", id));
    loadTree();
    loadFatherOptions();
  }
};

// ✏️ EDIT DATA
window.editPerson = async function(id, oldName, oldBirth) {
  const newName = prompt("Edit nama:", oldName);
  const newBirth = prompt("Edit tanggal lahir:", oldBirth);

  if (newName) {
    await updateDoc(doc(db, "people", id), {
      name: newName,
      birth_date: newBirth
    });

    loadTree();
    loadFatherOptions();
  }
};

// 📥 AMBIL DATA
async function getPeople() {
  const snapshot = await getDocs(collection(db, "people"));
  let people = [];

  snapshot.forEach(doc => {
    people.push({
      id: doc.id,
      ...doc.data()
    });
  });

  // urut tanggal lahir
  people.sort((a, b) => {
    if (!a.birth_date) return 1;
    if (!b.birth_date) return -1;
    return new Date(a.birth_date) - new Date(b.birth_date);
  });

  return people;
}

// 🌳 BUILD TREE
function buildTree(people) {
  let map = {};
  let root = null;

  people.forEach(p => {
    map[p.id] = { ...p, children: [] };
  });

  people.forEach(p => {
    if (p.father_id && map[p.father_id]) {
      map[p.father_id].children.push(map[p.id]);
    } else {
      root = map[p.id];
    }
  });

  function addOrder(node) {
    if (!node.children) return;

    node.children.forEach((child, index) => {
      child.orderLabel = `Anak ke-${index + 1}`;
      addOrder(child);
    });
  }

  if (root) addOrder(root);

  return root;
}

// 🎨 DRAW TREE (HORIZONTAL)
function drawTree(data) {
  document.getElementById("tree").innerHTML = "";

  const width = 1000;
  const height = 500;

  const svg = d3.select("#tree")
    .append("svg")
    .attr("width", width)
    .attr("height", height);

  const root = d3.hierarchy(data);
  const treeLayout = d3.tree().size([height - 100, width - 200]);

  treeLayout(root);

  // garis
  svg.selectAll("line")
    .data(root.links())
    .enter()
    .append("line")
    .attr("x1", d => d.source.y)
    .attr("y1", d => d.source.x)
    .attr("x2", d => d.target.y)
    .attr("y2", d => d.target.x)
    .attr("stroke", "black");

  // node
  const nodes = svg.selectAll("g")
    .data(root.descendants())
    .enter()
    .append("g")
    .attr("transform", d => `translate(${d.y}, ${d.x})`);

  nodes.append("circle")
    .attr("r", 20)
    .attr("fill", "lightblue");

  nodes.append("text")
    .attr("dy", 5)
    .attr("text-anchor", "middle")
    .text(d => {
      if (d.data.orderLabel) {
        return d.data.name + " (" + d.data.orderLabel + ")";
      }
      return d.data.name;
    });

  // tombol edit
  nodes.append("text")
    .attr("dy", 35)
    .attr("text-anchor", "middle")
    .style("fill", "blue")
    .style("cursor", "pointer")
    .text("Edit")
    .on("click", (event, d) => {
      editPerson(d.data.id, d.data.name, d.data.birth_date);
    });

  // tombol hapus
  nodes.append("text")
    .attr("dy", 50)
    .attr("text-anchor", "middle")
    .style("fill", "red")
    .style("cursor", "pointer")
    .text("Hapus")
    .on("click", (event, d) => {
      deletePerson(d.data.id);
    });
}

// 🔽 DROPDOWN AYAH
async function loadFatherOptions() {
  const people = await getPeople();
  const select = document.getElementById("father");

  select.innerHTML = '<option value="">-- Pilih Ayah (Root jika kosong) --</option>';

  people.forEach(p => {
    const option = document.createElement("option");
    option.value = p.id;
    option.text = p.name;
    select.appendChild(option);
  });
}

// 🔄 LOAD
async function loadTree() {
  const people = await getPeople();
  const treeData = buildTree(people);

  if (treeData) {
    drawTree(treeData);
  }
}

// 🚀 AUTO LOAD
loadTree();
loadFatherOptions();

</script>

</body>
</html>
