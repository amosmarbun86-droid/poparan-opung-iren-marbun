  background-repeat: no-repeat;
}

/* ===== SVG ===== */
#tree svg {
  width: 100%;
  display: block;
}

/* ===== NODE TEXT ===== */

/* ✅ FIX KLIK EDIT & DELETE */

  pointer-events: all !important; /* 🔥 INI KUNCINYA */

  user-select: none;
}

/* optional biar pasti */

}

/* ===== HOVER ===== */

}

}

/* ===== LINK SMOOTH ===== */

}

  }

  }
}

  background:white;

<body>

<h2>🌳 Poparan Opung Iren Marbun (Vertical)</h2>

<div class="container">

<div class="form-box">
  <h3>Tambah Anggota</h3>

  <input id="name" placeholder="Nama">
  <input id="birth" type="date">

  <select id="father">
    <option value="">-- Pilih Ayah --</option>
  </select>

  <button onclick="addPerson()">Tambah</button>

<button onclick="openModalTest()">Test Modal</button>

<!-- 🔥 TOMBOL SIMPAN GAMBAR -->
<button onclick="downloadTreeImage()">📸 Simpan Gambar</button>

  </div>

  <div class="tree-box">
    <div id="tree"></div>
  </div>

</div> <!-- ✅ WAJIB ditutup -->

<!-- ✅ Modal taruh di luar container -->
<div id="modal" class="modal">
  <div class="modal-content">
    <h3>Edit Data</h3>

    <input id="editName" placeholder="Nama">
    <input id="editBirth" type="date">

    <div class="modal-actions">
  <button onclick="saveEdit()">Simpan</button>
  <button onclick="deleteFromModal()" class="delete">Hapus</button>
  <button onclick="closeModal()" class="cancel">Batal</button>
    </div>
  </div>
</div>
  
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-app.js";
import { 
  getFirestore, 
  collection, 
  addDoc, 
  getDocs,
  deleteDoc,
  doc,
  updateDoc
} from "https://www.gstatic.com/firebasejs/10.7.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyAwb3uKq12i0VKYQnLfpmFnOUyosbcJXUI",
  authDomain: "poparan-opung-iren-marbun.firebaseapp.com",
  projectId: "poparan-opung-iren-marbun"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);


// 🗑️ HAPUS
window.deletePerson = async function(id) {
  if (confirm("Hapus data?")) {
    await deleteDoc(doc(db, "people", id));
    loadTree();
    loadFatherOptions();
  }
};
// ✏️ EDIT
let currentEditId = null;

window.editPerson = function(id, oldName, oldBirth) {
  currentEditId = id;

  document.getElementById("editName").value = oldName || "";
  document.getElementById("editBirth").value = oldBirth || "";

  document.getElementById("modal").style.display = "flex";
};
window.saveEdit = async function() {
  const name = document.getElementById("editName").value.trim();
  const birth = document.getElementById("editBirth").value;

  if (!name) {
    alert("Nama wajib diisi");
    return;
  }

  try {
    await updateDoc(doc(db, "people", currentEditId), {
      name,
      birth_date: birth
    });

    alert("Data berhasil diupdate ✅");

    closeModal();
    loadTree();
    loadFatherOptions();

  } catch (err) {
    console.error(err);
    alert("Gagal update data ❌");
  }
};
  window.addPerson = async function() {
  const name = nameEl.value.trim();
  const birth = birthEl.value;
  const father = fatherEl.value;

  if (!name) {
    alert("Nama wajib diisi");
    return;
  }

  if (!birth) {
    alert("Tanggal lahir wajib diisi");
    return;
  }

  try {
    await addDoc(collection(db, "people"), {
      name,
      birth_date: birth,
      father_id: father || null
    });

    nameEl.value = "";
    birthEl.value = "";
    fatherEl.value = "";

    alert("Berhasil ditambahkan ✅");

    loadTree();
    loadFatherOptions();
  } catch (err) {
    console.error(err);
    alert("Gagal menyimpan data ❌");
  }
};

// 📥 GET DATA
async function getPeople() {
  const snapshot = await getDocs(collection(db, "people"));
  let people = [];

  snapshot.forEach(doc => {
    people.push({ id: doc.id, ...doc.data() });
  });

  people.sort((a, b) => new Date(a.birth_date) - new Date(b.birth_date));
  return people;
}

// 🌳 BUILD TREE (tetap versi kamu)
function buildTree(people) {
  let map = {}, root = null;

  people.forEach(p => map[p.id] = { ...p, children: [] });

  people.forEach(p => {
    if (p.father_id && map[p.father_id]) {
      map[p.father_id].children.push(map[p.id]);
    } else {
      root = map[p.id];
    }
  });

  function addOrder(node) {
    node.children.forEach((c, i) => {
      c.orderLabel = `Anak ke-${i+1}`;
      addOrder(c);
    });
  }

  if (root) addOrder(root);
  return root;
}
function drawTree(data) {
  const container = document.getElementById("tree");
  container.innerHTML = "";

  const width = container.clientWidth;
  const height = container.clientHeight;

  const root = d3.hierarchy(data);

  const treeLayout = d3.tree()
    .nodeSize([150, 110]); // 🔥 sedikit diperlebar biar enak klik

  treeLayout(root);

  const nodes = root.descendants();

  // =========================
  // AUTO CENTER
  // =========================
  const minX = d3.min(nodes, d => d.x);
  const maxX = d3.max(nodes, d => d.x);
  const minY = d3.min(nodes, d => d.y);
  const maxY = d3.max(nodes, d => d.y);

  const treeWidth = maxX - minX;
  const treeHeight = maxY - minY;

  const offsetX = (width - treeWidth) / 2 - minX;
  const offsetY = (height - treeHeight) / 4 - minY;

  nodes.forEach(d => {
    d.x += offsetX;
    d.y += offsetY;
  });

  const svg = d3.select("#tree")
    .append("svg")
    .attr("width", width)
    .attr("height", height);

  const g = svg.append("g");

  // ======================
  // ZOOM
  // ======================
  svg.call(
    d3.zoom()
      .scaleExtent([0.5, 2])
      .on("zoom", (event) => {
        g.attr("transform", event.transform);
      })
  );

  // ======================
// LINKS (FIX FINAL)
// ======================
g.selectAll("path.link")
  .data(root.links())
  .enter()
  .append("path")
  .attr("class", "link") // ✅ WAJIB (ini yang kurang)
  .attr("fill", "none")
  .attr("stroke", "#90caf9")
  .attr("stroke-width", 2)
  .attr("d", d => `
    M${d.source.x},${d.source.y}
    C${d.source.x},${(d.source.y + d.target.y)/2}
     ${d.target.x},${(d.source.y + d.target.y)/2}
     ${d.target.x},${d.target.y}
  `);
  // ======================
  // NODES
  // ======================
  const nodeGroup = g.selectAll("g.node")
    .data(nodes)
    .enter()
    .append("g")
    .attr("class", "node")
    .attr("transform", d => `translate(${d.x}, ${d.y})`);

  // BOX
  nodeGroup.append("rect")
    .attr("x", -60)
    .attr("y", -25)
    .attr("width", 120)
    .attr("height", 55)
    .attr("rx", 10)
    .attr("fill", "rgba(255,255,255,0.15)")
    .attr("stroke", "#00e5ff")
    .attr("stroke-width", 1.5)

  // NAMA
  nodeGroup.append("text")
    .attr("text-anchor", "middle")
    .attr("dy", -5)
    .style("font-weight", "bold")
    .style("font-size", "13px")
    .text(d => d.data.name);

  // LABEL
  nodeGroup.append("text")
    .attr("dy", 16)
    .attr("text-anchor", "middle")
    .style("font-size", "10px")
    .style("fill", "#666")
    .text(d => d.data.orderLabel || "");

  // ======================
  // EDIT
  // ======================
  nodeGroup.append("text")
    .attr("class", "edit-btn")
    .attr("x", -45)
    .attr("y", 20)
    .text("✏️")
    .style("font-size", "16px")
    .on("click", (event, d) => {
      event.stopPropagation();
      event.preventDefault();
      window.editPerson(d.data.id, d.data.name, d.data.birth_date);
    });

  // ======================
  // DELETE
  // ======================
  nodeGroup.append("text")
    .attr("class", "delete-btn")
    .attr("x", 45)
    .attr("y", 20)
    .text("🗑")
    .style("font-size", "16px")
    .on("click", (event, d) => {
      event.stopPropagation();
      event.preventDefault();
      window.deletePerson(d.data.id);
    });

  // ======================
  // ANIMATION
  // ======================
  nodeGroup.style("opacity", 0)
    .transition()
    .duration(400)
    .style("opacity", 1);
}
// dropdown
async function loadFatherOptions() {
  const people = await getPeople();
  const select = document.getElementById("father");

  select.innerHTML = '<option value="">-- Pilih Ayah --</option>';

  people.forEach(p => {
    const o = document.createElement("option");
    o.value = p.id;
    o.text = p.name;
    select.appendChild(o);
  });
}

// load
async function loadTree() {
  const people = await getPeople();
  const treeData = buildTree(people);
  if (treeData) drawTree(treeData);
}

const nameEl = document.getElementById("name");
const birthEl = document.getElementById("birth");
const fatherEl = document.getElementById("father");

loadTree();
loadFatherOptions();

// buka modal (test)
function openModalTest() {
  document.getElementById("modal").style.display = "flex";
}

// tutup modal
function closeModal() {
  document.getElementById("modal").style.display = "none";
}

// ✅ DELETE HARUS DI LUAR
async function deleteFromModal() {
  if (!currentEditId) return;

  if (!confirm("Yakin mau hapus data ini?")) return;

  try {
    await deleteDoc(doc(db, "people", currentEditId));

    alert("Data berhasil dihapus 🗑️");

    closeModal();
    loadTree();
    loadFatherOptions();

  } catch (err) {
    console.error(err);
    alert("Gagal menghapus ❌");
  }
}

// klik luar modal
window.onclick = function(event) {
  const modal = document.getElementById("modal");

  if (event.target === modal) {
    closeModal();
  }
};
// ======================
// 📸 DOWNLOAD GAMBAR TREE
// ======================
window.downloadTreeImage = function () {
  const area = document.querySelector(".tree-box"); // 🔥 ambil area tree

  html2canvas(area, {
    scale: 2,        // biar HD
    useCORS: true    // biar background bisa ikut
  }).then(canvas => {
    const link = document.createElement("a");
    link.download = "family-tree.png";
    link.href = canvas.toDataURL("image/png");
    link.click();
  });
};
</script>
