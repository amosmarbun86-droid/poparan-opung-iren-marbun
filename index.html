<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<title>Poparan Opung Iren Marbun</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@500&display=swap" rel="stylesheet">
<script src="https://d3js.org/d3.v7.min.js"></script>

<style>
body {margin:0;padding:10px;font-family:'Cinzel', serif;}

body::before{
  content:"";position:fixed;width:200%;height:200%;
  background:#8B0000;opacity:0.2;z-index:-2;
}
body::after{
  content:"";position:fixed;width:100%;height:100%;
  background:#fff8f0;z-index:-1;
}

.header{text-align:center;color:#8B0000;}
.form-box{background:#fff;padding:15px;border:2px solid #8B0000;border-radius:10px;}
.form-box input,.form-box select{width:100%;padding:10px;margin:5px 0;}
.form-box button{width:100%;padding:12px;background:#8B0000;color:#fff;border:none;}

.tree-box{border:2px solid #8B0000;border-radius:10px;margin-top:10px;height:80vh;overflow:hidden;}

.node{opacity:0.3}
.node-box{stroke-width:2;rx:10}

.link{stroke:#ccc;stroke-width:2;opacity:0.3}

.active-node{opacity:1!important}
.active-link{
  stroke:#ff0000!important;
  stroke-width:4;
  filter:drop-shadow(0 0 6px red);
  opacity:1!important;
}

.search-box{margin:10px 0;}
.search-box input{width:100%;padding:10px;border:2px solid #8B0000;}

#popup{
  position:fixed;top:50%;left:50%;
  transform:translate(-50%,-50%);
  background:white;padding:20px;border-radius:10px;
  display:none;z-index:999;
}
</style>
</head>

<body>

<div class="header">
  <h2>🌳 Poparan Opung Iren Marbun</h2>
</div>

<div class="form-box">
  <input id="name" placeholder="Nama">
  <input id="birth" type="date">
  <select id="father"></select>
  <button onclick="addPerson()">Tambah</button>
</div>

<div class="search-box">
  <input id="search" placeholder="🔍 Cari nama...">
</div>

<div class="tree-box">
  <div id="tree"></div>
</div>

<div id="popup"></div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-app.js";
import { getFirestore, collection, addDoc, getDocs, deleteDoc, doc, updateDoc }
from "https://www.gstatic.com/firebasejs/10.7.0/firebase-firestore.js";

const app = initializeApp({
  apiKey:"AIzaSy...",
  authDomain:"poparan-opung-iren-marbun.firebaseapp.com",
  projectId:"poparan-opung-iren-marbun"
});
const db = getFirestore(app);

let allNodes=[];

/* CRUD */
window.addPerson=async()=>{
  if(!name.value) return alert("Nama wajib");
  await addDoc(collection(db,"people"),{
    name:name.value,
    birth_date:birth.value,
    father_id:father.value||null
  });
  name.value="";birth.value="";loadAll();
};

window.deletePerson=async(id)=>{
  if(confirm("Hapus?")){
    await deleteDoc(doc(db,"people",id));
    loadAll();
  }
};

window.editPerson=async(id,n,b)=>{
  const nn=prompt("Nama:",n);
  const bb=prompt("Tanggal:",b);
  if(nn){
    await updateDoc(doc(db,"people",id),{name:nn,birth_date:bb});
    loadAll();
  }
};

async function getPeople(){
  const s=await getDocs(collection(db,"people"));
  let arr=[];
  s.forEach(d=>arr.push({id:d.id,...d.data()}));
  return arr;
}

/* TREE BUILD */
function buildTree(data){
  let map={},roots=[];
  data.forEach(p=>map[p.id]={...p,children:[]});

  data.forEach(p=>{
    if(p.father_id && map[p.father_id]){
      map[p.father_id].children.push(map[p.id]);
    } else roots.push(map[p.id]);
  });

  const colors=["#e74c3c","#3498db","#27ae60","#f1c40f","#9b59b6","#e67e22"];

  function process(node,depth=1,color=null){
    node.generation="Gen-"+depth;

    node.children.sort((a,b)=>new Date(a.birth_date||0)-new Date(b.birth_date||0));

    node.children.forEach((c,i)=>{
      c.orderLabel="Anak ke-"+(i+1);
      c.color= depth===1 ? colors[i%colors.length] : color;
      process(c,depth+1,c.color);
    });

    if(depth===1) node.color="#8B0000";
  }

  roots.forEach(r=>process(r));
  return roots.length===1?roots[0]:{name:"ROOT",children:roots};
}

/* DRAW RADIAL */
function drawTree(data){
  tree.innerHTML="";
  const width=window.innerWidth;
  const radius=Math.min(width,window.innerHeight)/2-50;

  const svg=d3.select("#tree").append("svg")
    .attr("width",width)
    .attr("height",window.innerHeight)
    .call(d3.zoom().scaleExtent([0.5,2])
    .on("zoom",(e)=>g.attr("transform",e.transform)));

  const g=svg.append("g")
    .attr("transform",`translate(${width/2},${window.innerHeight/2})`);

  const root=d3.hierarchy(data);
  d3.tree().size([2*Math.PI,radius])(root);

  /* LINKS */
  const links=g.selectAll("path")
    .data(root.links())
    .enter().append("path")
    .attr("class","link")
    .attr("stroke",d=>d.source.data.color||"#ccc")
    .attr("fill","none")
    .attr("d",d3.linkRadial()
      .angle(d=>d.x)
      .radius(d=>d.y)
    );

  /* NODES */
  const nodes=g.selectAll("g")
    .data(root.descendants())
    .enter().append("g")
    .attr("class","node")
    .attr("transform",d=>`
      rotate(${d.x*180/Math.PI-90})
      translate(${d.y},0)
    `)
    .on("click",(e,d)=>{highlightFull(d);showPopup(d.data);});

  nodes.each(function(d){d.el=this;});
  allNodes=nodes.data();

  nodes.append("circle")
    .attr("r",6)
    .attr("fill",d=>d.data.color||"#8B0000");

  nodes.append("text")
    .attr("dy","0.31em")
    .attr("x",d=>d.x<Math.PI?10:-10)
    .attr("text-anchor",d=>d.x<Math.PI?"start":"end")
    .attr("transform",d=>d.x>=Math.PI?"rotate(180)":"")
    .text(d=>d.data.name);
}

/* HIGHLIGHT */
function highlightFull(d){
  d3.selectAll(".node").classed("active-node",false);
  d3.selectAll(".link").classed("active-link",false);

  function up(n){
    if(!n)return;
    d3.select(n.el).classed("active-node",true);
    if(n.parent){
      d3.selectAll(".link").filter(l=>l.target===n).classed("active-link",true);
      up(n.parent);
    }
  }

  function down(n){
    d3.select(n.el).classed("active-node",true);
    if(n.children){
      n.children.forEach(c=>{
        d3.selectAll(".link").filter(l=>l.source===n&&l.target===c)
        .classed("active-link",true);
        down(c);
      });
    }
  }

  up(d);down(d);
}

/* SEARCH */
search.oninput=function(){
  const val=this.value.toLowerCase();
  if(!val)return;
  const f=allNodes.find(n=>n.data.name.toLowerCase().includes(val));
  if(f) highlightFull(f);
};

/* POPUP */
function showPopup(d){
  popup.style.display="block";
  popup.innerHTML=`<h3>${d.name}</h3><p>${d.birth_date||""}</p>
  <button onclick="popup.style.display='none'">Tutup</button>`;
}

/* LOAD */
async function loadAll(){
  const data=await getPeople();
  const t=buildTree(data);
  if(t) drawTree(t);

  father.innerHTML='<option value="">-- Ayah --</option>';
  data.forEach(p=>{
    let o=document.createElement("option");
    o.value=p.id;o.text=p.name;
    father.appendChild(o);
  });
}

loadAll();
</script>

</body>
</html>
