<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<title>Poparan Opung Iren Marbun</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@500&display=swap" rel="stylesheet">
<script src="https://d3js.org/d3.v7.min.js"></script>

<style>
body {
  margin:0;
  padding:10px;
  font-family:'Cinzel', serif;
}

/* BACKGROUND ULOS */
body::before{
  content:"";
  position:fixed;
  width:200%;
  height:200%;
  background:#8B0000;
  opacity:0.2;
  z-index:-2;
}
body::after{
  content:"";
  position:fixed;
  width:100%;
  height:100%;
  background:#fff8f0;
  z-index:-1;
}

/* UI */
.header{text-align:center;color:#8B0000;}
.form-box{background:#fff;padding:15px;border:2px solid #8B0000;border-radius:10px;}
.form-box input,.form-box select{width:100%;padding:10px;margin:5px 0;}
.form-box button{width:100%;padding:12px;background:#8B0000;color:#fff;border:none;}

.tree-box{border:2px solid #8B0000;border-radius:10px;margin-top:10px;overflow:auto;height:75vh;}
#tree svg{touch-action:none}

/* NODE */
.node{opacity:0.3}
.node-box{fill:#fff8f0;stroke:#8B0000;stroke-width:2;rx:12}

/* LINK */
.link{stroke:#ccc;stroke-width:2;opacity:0.3}

/* ACTIVE */
.active-node{opacity:1 !important}
.active-link{
  stroke:#ff0000 !important;
  stroke-width:4;
  opacity:1 !important;
  filter: drop-shadow(0 0 6px red);
}

/* SEARCH */
.search-box{
  margin:10px 0;
}
.search-box input{
  width:100%;
  padding:10px;
  border:2px solid #8B0000;
}

/* POPUP */
#popup{
  position:fixed;
  top:50%;
  left:50%;
  transform:translate(-50%,-50%);
  background:white;
  padding:20px;
  border-radius:10px;
  display:none;
  z-index:999;
}
</style>
</head>

<body>

<div class="header">
  <h2>🌳 Poparan Opung Iren Marbun</h2>
</div>

<div class="form-box">
  <input id="name" placeholder="Nama">
  <input id="birth" type="date">
  <select id="father"></select>
  <button onclick="addPerson()">Tambah</button>
</div>

<div class="search-box">
  <input id="search" placeholder="🔍 Cari nama...">
</div>

<div class="tree-box">
  <div id="tree"></div>
</div>

<div id="popup"></div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-app.js";
import { getFirestore, collection, addDoc, getDocs, deleteDoc, doc, updateDoc }
from "https://www.gstatic.com/firebasejs/10.7.0/firebase-firestore.js";

const app = initializeApp({
  apiKey:"AIzaSy...",
  authDomain:"poparan-opung-iren-marbun.firebaseapp.com",
  projectId:"poparan-opung-iren-marbun"
});
const db = getFirestore(app);

let allNodes = [];

/* CRUD */
window.addPerson=async()=>{
  if(!name.value) return alert("Nama wajib");
  await addDoc(collection(db,"people"),{
    name:name.value,
    birth_date:birth.value,
    father_id:father.value||null
  });
  name.value="";birth.value="";loadAll();
};

window.deletePerson=async(id)=>{
  if(confirm("Hapus?")){
    await deleteDoc(doc(db,"people",id));
    loadAll();
  }
};

window.editPerson=async(id,n,b)=>{
  const nn=prompt("Nama:",n);
  const bb=prompt("Tanggal:",b);
  if(nn){
    await updateDoc(doc(db,"people",id),{name:nn,birth_date:bb});
    loadAll();
  }
};

async function getPeople(){
  const s=await getDocs(collection(db,"people"));
  let arr=[];
  s.forEach(d=>arr.push({id:d.id,...d.data()}));
  return arr;
}

/* TREE */
function buildTree(data){
  let map={},roots=[];
  data.forEach(p=>map[p.id]={...p,children:[]});
  data.forEach(p=>{
    if(p.father_id && map[p.father_id]){
      map[p.father_id].children.push(map[p.id]);
    } else roots.push(map[p.id]);
  });
  return roots.length===1?roots[0]:{name:"ROOT",children:roots};
}

/* DRAW */
function drawTree(data){
  tree.innerHTML="";
  const svg=d3.select("#tree").append("svg")
    .attr("width",window.innerWidth)
    .attr("height",window.innerHeight)
    .call(d3.zoom().scaleExtent([0.5,2]).on("zoom",(e)=>g.attr("transform",e.transform)));

  const g=svg.append("g").attr("transform","translate(80,50)");
  const root=d3.hierarchy(data);
  d3.tree().size([window.innerHeight-100,window.innerWidth-200])(root);

  /* LINKS */
  const links=g.selectAll("path")
    .data(root.links())
    .enter().append("path")
    .attr("class","link")
    .attr("d",d=>`M${d.source.y},${d.source.x}
    C${(d.source.y+d.target.y)/2},${d.source.x}
     ${(d.source.y+d.target.y)/2},${d.target.x}
     ${d.target.y},${d.target.x}`);

  /* NODES */
  const nodes=g.selectAll("g")
    .data(root.descendants())
    .enter().append("g")
    .attr("class","node")
    .attr("transform",d=>`translate(${d.y},${d.x})`)
    .on("click",(e,d)=>{
      highlightFull(d);
      showPopup(d.data);
    });

  nodes.each(function(d){ d.el=this; });
  allNodes = nodes.data();

  nodes.append("rect")
    .attr("class","node-box")
    .attr("x",-60).attr("y",-25)
    .attr("width",120).attr("height",50);

  nodes.append("text")
    .attr("text-anchor","middle")
    .text(d=>d.data.name);

  nodes.append("text")
    .attr("dy","25")
    .attr("text-anchor","middle")
    .text("✏️")
    .on("click",(e,d)=>{e.stopPropagation();editPerson(d.data.id,d.data.name,d.data.birth_date);});

  nodes.append("text")
    .attr("dy","38")
    .attr("text-anchor","middle")
    .text("🗑️")
    .on("click",(e,d)=>{e.stopPropagation();deletePerson(d.data.id);});
}

/* HIGHLIGHT FULL */
function highlightFull(d){
  d3.selectAll(".node").classed("active-node",false);
  d3.selectAll(".link").classed("active-link",false);

  function up(n){
    if(!n) return;
    d3.select(n.el).classed("active-node",true);
    if(n.parent){
      d3.selectAll(".link").filter(l=>l.target===n).classed("active-link",true);
      up(n.parent);
    }
  }

  function down(n){
    d3.select(n.el).classed("active-node",true);
    if(n.children){
      n.children.forEach(c=>{
        d3.selectAll(".link").filter(l=>l.source===n && l.target===c)
          .classed("active-link",true);
        down(c);
      });
    }
  }

  up(d);
  down(d);
}

/* SEARCH */
search.oninput = function(){
  const val = this.value.toLowerCase();
  if(!val) return;

  const found = allNodes.find(n => n.data.name.toLowerCase().includes(val));
  if(found){
    highlightFull(found);
  }
};

/* POPUP */
function showPopup(d){
  popup.style.display="block";
  popup.innerHTML=`<h3>${d.name}</h3><p>${d.birth_date||""}</p>
  <button onclick="popup.style.display='none'">Tutup</button>`;
}

/* LOAD */
async function loadAll(){
  const data=await getPeople();
  const t=buildTree(data);
  if(t) drawTree(t);

  father.innerHTML='<option value="">-- Ayah --</option>';
  data.forEach(p=>{
    let o=document.createElement("option");
    o.value=p.id;o.text=p.name;
    father.appendChild(o);
  });
}

loadAll();
</script>

</body>
</html>
