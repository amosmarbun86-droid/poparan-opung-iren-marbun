<!DOCTYPE html>
<html>
<head>
  <title>Poparan Opung Iren Marbun</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <script src="https://d3js.org/d3.v7.min.js"></script>

  <style>
    body {
      font-family: Arial, sans-serif;
      background: linear-gradient(135deg, #e3f2fd, #ffffff);
      margin: 0;
      padding: 10px;
    }

    .header {
      text-align: center;
      margin-bottom: 10px;
    }

    .header h2 {
      margin: 0;
    }

    .header small {
      color: gray;
    }

    .container {
      display: flex;
      flex-direction: column;
      gap: 15px;
    }

    .form-box {
      background: white;
      padding: 15px;
      border-radius: 12px;
      box-shadow: 0 4px 10px rgba(0,0,0,0.1);
    }

    .form-box input, .form-box select {
      width: 100%;
      padding: 10px;
      margin-bottom: 10px;
      border-radius: 8px;
      border: 1px solid #ccc;
      font-size: 14px;
    }

    .form-box button {
      width: 100%;
      padding: 12px;
      background: #4CAF50;
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 16px;
      cursor: pointer;
    }

    .tree-box {
      background: white;
      border-radius: 12px;
      padding: 10px;
      box-shadow: 0 4px 10px rgba(0,0,0,0.1);
      overflow: auto;
    }
  </style>
</head>

<body>

<div class="header">
  <h2>🌳 Poparan Opung Iren Marbun</h2>
  <small>Pohon keluarga digital</small>
</div>

<div class="container">

  <div class="form-box">
    <input id="name" placeholder="Nama">
    <input id="birth" type="date">

    <select id="father">
      <option value="">-- Pilih Ayah --</option>
    </select>

    <button onclick="addPerson()">Tambah</button>
  </div>

  <div class="tree-box">
    <div id="tree"></div>
  </div>

</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-app.js";
import { 
  getFirestore, 
  collection, 
  addDoc, 
  getDocs,
  deleteDoc,
  doc,
  updateDoc
} from "https://www.gstatic.com/firebasejs/10.7.0/firebase-firestore.js";

// 🔥 FIREBASE
const firebaseConfig = {
  apiKey: "AIzaSyAwb3uKq12i0VKYQnLfpmFnOUyosbcJXUI",
  authDomain: "poparan-opung-iren-marbun.firebaseapp.com",
  projectId: "poparan-opung-iren-marbun"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

// ➕ TAMBAH
window.addPerson = async function() {
  const name = document.getElementById("name").value;
  const birth = document.getElementById("birth").value;
  const father = document.getElementById("father").value;

  if (!name) return alert("Nama wajib diisi");

  await addDoc(collection(db, "people"), {
    name,
    birth_date: birth,
    father_id: father || null
  });

  // clear form
  document.getElementById("name").value = "";
  document.getElementById("birth").value = "";
  document.getElementById("father").value = "";

  loadTree();
  loadFatherOptions();
};

// 🗑️ HAPUS
window.deletePerson = async function(id) {
  if (confirm("Hapus data?")) {
    await deleteDoc(doc(db, "people", id));
    loadTree();
    loadFatherOptions();
  }
};

// ✏️ EDIT
window.editPerson = async function(id, oldName, oldBirth) {
  const name = prompt("Nama:", oldName);
  const birth = prompt("Tanggal:", oldBirth);

  if (name) {
    await updateDoc(doc(db, "people", id), {
      name,
      birth_date: birth
    });

    loadTree();
    loadFatherOptions();
  }
};

// 📥 GET DATA
async function getPeople() {
  const snapshot = await getDocs(collection(db, "people"));
  let people = [];

  snapshot.forEach(doc => {
    people.push({ id: doc.id, ...doc.data() });
  });

  people.sort((a, b) => new Date(a.birth_date) - new Date(b.birth_date));
  return people;
}

// 🌳 BUILD TREE
function buildTree(people) {
  let map = {}, root = null;

  people.forEach(p => map[p.id] = { ...p, children: [] });

  people.forEach(p => {
    if (p.father_id && map[p.father_id]) {
      map[p.father_id].children.push(map[p.id]);
    } else {
      root = map[p.id];
    }
  });

  function addOrder(node) {
    node.children.forEach((c, i) => {
      c.orderLabel = `Anak ke-${i + 1}`;
      addOrder(c);
    });
  }

  if (root) addOrder(root);
  return root;
}

// 🎨 DRAW TREE (VERTICAL)
function drawTree(data) {
  document.getElementById("tree").innerHTML = "";

  const width = window.innerWidth - 40;
  const height = window.innerHeight - 150;

  const svg = d3.select("#tree")
    .append("svg")
    .attr("width", width)
    .attr("height", height)
    .call(d3.zoom().on("zoom", (event) => {
      g.attr("transform", event.transform);
    }));

  const g = svg.append("g")
    .attr("transform", "translate(20,40)");

  const root = d3.hierarchy(data);
  const treeLayout = d3.tree().size([width - 50, height - 100]);

  treeLayout(root);

  // garis smooth
  g.selectAll("path")
    .data(root.links())
    .enter()
    .append("path")
    .attr("fill", "none")
    .attr("stroke", "#90caf9")
    .attr("stroke-width", 2)
    .attr("d", d => `
      M${d.source.x},${d.source.y}
      C${d.source.x},${(d.source.y + d.target.y)/2}
       ${d.target.x},${(d.source.y + d.target.y)/2}
       ${d.target.x},${d.target.y}
    `);

  const nodes = g.selectAll("g")
    .data(root.descendants())
    .enter()
    .append("g")
    .attr("transform", d => `translate(${d.x},${d.y})`);

  const node = nodes.append("g");

  // card
  node.append("rect")
    .attr("x", -50)
    .attr("y", -25)
    .attr("width", 100)
    .attr("height", 50)
    .attr("rx", 10)
    .attr("fill", "#fff")
    .attr("stroke", "#90caf9")
    .style("filter", "drop-shadow(0px 4px 6px rgba(0,0,0,0.1))");

  node.append("text")
    .attr("dy", -2)
    .attr("text-anchor", "middle")
    .style("font-weight", "bold")
    .text(d => d.data.name);

  node.append("text")
    .attr("dy", 12)
    .attr("text-anchor", "middle")
    .style("font-size", "10px")
    .text(d => d.data.orderLabel || "");

  // tombol edit
  node.append("text")
    .attr("dy", 28)
    .attr("text-anchor", "middle")
    .style("cursor", "pointer")
    .text("✏️")
    .on("click", (e, d) => {
      e.stopPropagation();
      editPerson(d.data.id, d.data.name, d.data.birth_date);
    });

  // tombol hapus
  node.append("text")
    .attr("dy", 40)
    .attr("text-anchor", "middle")
    .style("cursor", "pointer")
    .text("🗑️")
    .on("click", (e, d) => {
      e.stopPropagation();
      deletePerson(d.data.id);
    });

  // animasi
  nodes.style("opacity", 0)
    .transition()
    .duration(800)
    .style("opacity", 1);

  // hover
  node.on("mouseover", function() {
    d3.select(this).select("rect").attr("fill", "#e3f2fd");
  }).on("mouseout", function() {
    d3.select(this).select("rect").attr("fill", "#fff");
  });
}

// dropdown
async function loadFatherOptions() {
  const people = await getPeople();
  const select = document.getElementById("father");

  select.innerHTML = '<option value="">-- Pilih Ayah --</option>';

  people.forEach(p => {
    const o = document.createElement("option");
    o.value = p.id;
    o.text = p.name;
    select.appendChild(o);
  });
}

// load
async function loadTree() {
  const people = await getPeople();
  const treeData = buildTree(people);
  if (treeData) drawTree(treeData);
}

loadTree();
loadFatherOptions();

</script>

</body>
</html>
