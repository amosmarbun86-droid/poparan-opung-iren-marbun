<!DOCTYPE html>
<html>
<head>
  <title>Poparan Opung Iren Marbun</title>
  <script src="https://d3js.org/d3.v7.min.js"></script>

  <style>
    body {
      font-family: Arial, sans-serif;
      background: linear-gradient(135deg, #e3f2fd, #ffffff);
      margin: 0;
      padding: 20px;
    }

    h2 { color: #333; }

    .container {
      display: flex;
      gap: 20px;
    }

    .form-box {
      background: white;
      padding: 20px;
      border-radius: 12px;
      width: 300px;
      box-shadow: 0 6px 15px rgba(0,0,0,0.1);
    }

    .form-box input, .form-box select {
      width: 100%;
      padding: 8px;
      margin-bottom: 10px;
      border-radius: 6px;
      border: 1px solid #ccc;
    }

    .form-box button {
      width: 100%;
      padding: 10px;
      background: #4CAF50;
      color: white;
      border: none;
      border-radius: 6px;
      cursor: pointer;
    }

    .tree-box {
      flex: 1;
      background: white;
      border-radius: 12px;
      padding: 10px;
      box-shadow: 0 6px 15px rgba(0,0,0,0.1);
      overflow: hidden;
    }

    .node rect {
      transition: 0.2s;
    }

    .node:hover rect {
      fill: #e3f2fd;
      transform: scale(1.03);
    }

    .link {
      fill: none;
      stroke-width: 2;
    }
  </style>
</head>

<body>

<h2>🌳 Poparan Opung Iren Marbun</h2>

<div class="container">

  <div class="form-box">
    <h3>Tambah Anggota</h3>

    <input id="name" placeholder="Nama">
    <input id="birth" type="date">

    <select id="father">
      <option value="">-- Pilih Ayah --</option>
    </select>

    <button onclick="addPerson()">Tambah</button>
  </div>

  <div class="tree-box">
    <div id="tree"></div>
  </div>

</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-app.js";
import { getFirestore, collection, addDoc, getDocs, deleteDoc, doc, updateDoc }
from "https://www.gstatic.com/firebasejs/10.7.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyAwb3uKq...",
  authDomain: "poparan-opung-iren-marbun.firebaseapp.com",
  projectId: "poparan-opung-iren-marbun"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

window.addPerson = async function() {
  const n = name.value.trim();
  const b = birth.value;
  const f = father.value;

  if(!n) return alert("Nama wajib diisi!");
  
  // 👉 hanya boleh 1 root (opsional tapi disarankan)
  const people = await getPeople();
  if(!f && people.length > 0){
    return alert("Pilih ayah! Hanya 1 orang tanpa ayah (root).");
  }

  await addDoc(collection(db, "people"), {
    name: n,
    birth_date: b || null,
    father_id: f || null
  });

  // reset input
  name.value = "";
  birth.value = "";
  father.value = "";

  loadTree();
  loadFatherOptions();
};

window.deletePerson = async function(id) {
  if (confirm("Hapus data?")) {
    await deleteDoc(doc(db, "people", id));
    loadTree(); loadFatherOptions();
  }
};

window.editPerson = async function(id, n, b) {
  const nn = prompt("Nama:", n);
  const bb = prompt("Tanggal:", b);
  if (nn) {
    await updateDoc(doc(db, "people", id), { name: nn, birth_date: bb });
    loadTree(); loadFatherOptions();
  }
};

async function getPeople(){
  const s = await getDocs(collection(db,"people"));
  let arr=[];
  s.forEach(d=>arr.push({id:d.id,...d.data()}));
  return arr;
}

/* TREE + WARNA + GENERASI */
function buildTree(data){
  let map={}, roots=[];

  // mapping
  data.forEach(p=>{
    map[p.id]={...p, children:[]};
  });

  // relasi parent-child
  data.forEach(p=>{
    if(p.father_id && map[p.father_id]){
      map[p.father_id].children.push(map[p.id]);
    } else {
      roots.push(map[p.id]);
    }
  });

  // handle multi root
  let root;
  if(roots.length === 1){
    root = roots[0];
  } else {
    root = {
      name: "KELUARGA",
      children: roots
    };
  }

  // warna cabang
  const colors = ["#4CAF50","#2196F3","#FF9800","#9C27B0","#E91E63"];

  function process(node, depth=1, color=null){

    node.generation = "Gen-" + depth;

    // safety (hindari error undefined)
    if(!node.children || node.children.length === 0) return;

    // urut berdasarkan tanggal lahir
    node.children.sort((a,b)=>{
      return new Date(a.birth_date || 0) - new Date(b.birth_date || 0);
    });

    node.children.forEach((c,i)=>{
      c.orderLabel = "Anak ke-" + (i+1);

      // warna cabang dari anak root
      c.color = depth === 1 ? colors[i % colors.length] : color;

      process(c, depth+1, c.color);
    });

    // warna root
    if(depth === 1){
      node.color = "#333";
    }
  }

  process(root);

  return root;
}

/* DRAW ORG CHART */
function drawTree(data){
  document.getElementById("tree").innerHTML="";

  const svg = d3.select("#tree").append("svg")
    .attr("width", 1200)
    .attr("height", 700)
    .call(d3.zoom().on("zoom",(e)=>g.attr("transform",e.transform)));

  const g = svg.append("g").attr("transform","translate(50,50)");

  const root = d3.hierarchy(data);

  const treeLayout = d3.tree().nodeSize([140,100]);
  treeLayout(root);

  /* GARIS SIKU */
  g.selectAll("path")
    .data(root.links())
    .enter()
    .append("path")
    .attr("class","link")
    .attr("stroke",d=>d.source.data.color||"#999")
    .attr("d",d=>`
      M${d.source.x},${d.source.y}
      V${(d.source.y+d.target.y)/2}
      H${d.target.x}
      V${d.target.y}
    `);

  const nodes = g.selectAll("g")
    .data(root.descendants())
    .enter()
    .append("g")
    .attr("class","node")
    .attr("transform",d=>`translate(${d.x},${d.y})`);

  /* CARD */
  nodes.append("rect")
    .attr("x",-60)
    .attr("y",-30)
    .attr("width",120)
    .attr("height",60)
    .attr("rx",10)
    .attr("fill","#fff")
    .attr("stroke",d=>d.data.color||"#333")
    .style("filter","drop-shadow(0px 4px 6px rgba(0,0,0,0.1))");

  nodes.append("text")
    .attr("text-anchor","middle")
    .attr("dy","-5")
    .style("font-weight","bold")
    .text(d=>d.data.name);

  nodes.append("text")
    .attr("text-anchor","middle")
    .attr("dy","10")
    .style("font-size","10px")
    .text(d=>d.data.orderLabel||"");

  nodes.append("text")
    .attr("text-anchor","middle")
    .attr("dy","22")
    .style("font-size","9px")
    .text(d=>d.data.generation||"");

  nodes.append("text")
    .attr("dy","36")
    .attr("text-anchor","middle")
    .text("✏️")
    .on("click",(e,d)=>{e.stopPropagation();editPerson(d.data.id,d.data.name,d.data.birth_date);});

  nodes.append("text")
    .attr("dy","48")
    .attr("text-anchor","middle")
    .text("🗑️")
    .on("click",(e,d)=>{e.stopPropagation();deletePerson(d.data.id);});
}

async function loadTree(){
  const data=await getPeople();
  const t=buildTree(data);
  if(t) drawTree(t);
}

async function loadFatherOptions(){
  const people=await getPeople();
  father.innerHTML='<option value="">-- Pilih Ayah --</option>';
  people.forEach(p=>{
    let o=document.createElement("option");
    o.value=p.id;o.text=p.name;
    father.appendChild(o);
  });
}

loadTree();
loadFatherOptions();
</script>

</body>
</html>
