<!DOCTYPE html>
<html>
<head>
  <title>Poparan Opung Iren Marbun (Vertical)</title>
  <script src="https://d3js.org/d3.v7.min.js"></script>

  <style>
    body {
  font-family: Arial, sans-serif;
  background: linear-gradient(135deg, #e3f2fd, #ffffff);
  margin: 0;
  padding: 20px;
}

h2 {
  color: #333;
  text-align: center; /* 🔥 biar lebih rapi */
}

/* layout jadi atas-bawah */
.container {
  display: block;
}

/* form */
.form-box {
  background: white;
  padding: 20px;
  border-radius: 12px;
  width: 100%;
  max-width: 500px;
  margin: 0 auto 15px; /* 🔥 center + jarak bawah */
  box-shadow: 0 4px 10px rgba(0,0,0,0.1);
}

.form-box input, 
.form-box select {
  width: 100%;
  padding: 8px;
  margin-bottom: 10px;
  border-radius: 6px;
  border: 1px solid #ccc;
}

.form-box button {
  width: 100%;
  padding: 10px;
  background: #4CAF50;
  color: white;
  border: none;
  border-radius: 6px;
  cursor: pointer;
}

/* tree */
.tree-box {
  width: 100%; /* 🔥 pastikan full */
  height: calc(100vh - 220px); /* 🔥 disesuaikan karena form di atas */
  overflow: auto;
  -webkit-overflow-scrolling: touch;
  background: white; /* 🔥 biar beda dari background */
  border-radius: 12px;
  padding: 10px;
}

#tree svg {
  min-width: 600px;
}

#tree {
  width: 100%;
  height: 100%;
}
  </style>
</head>

<body>

<h2>🌳 Poparan Opung Iren Marbun (Vertical)</h2>

<div class="container">

  <div class="form-box">
    <h3>Tambah Anggota</h3>

    <input id="name" placeholder="Nama">
    <input id="birth" type="date">

    <select id="father">
      <option value="">-- Pilih Ayah --</option>
    </select>

    <button onclick="addPerson()">Tambah</button>
  </div>

  <div class="tree-box">
    <div id="tree"></div>
  </div>

</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-app.js";
import { 
  getFirestore, 
  collection, 
  addDoc, 
  getDocs,
  deleteDoc,
  doc,
  updateDoc
} from "https://www.gstatic.com/firebasejs/10.7.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyAwb3uKq12i0VKYQnLfpmFnOUyosbcJXUI",
  authDomain: "poparan-opung-iren-marbun.firebaseapp.com",
  projectId: "poparan-opung-iren-marbun"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

// ➕ TAMBAH
window.addPerson = async function() {
  const name = nameEl.value;
  const birth = birthEl.value;
  const father = fatherEl.value;

  await addDoc(collection(db, "people"), {
    name, birth_date: birth, father_id: father || null
  });

  loadTree();
  loadFatherOptions();
};

// 🗑️ HAPUS
window.deletePerson = async function(id) {
  if (confirm("Hapus data?")) {
    await deleteDoc(doc(db, "people", id));
    loadTree();
    loadFatherOptions();
  }
};

// ✏️ EDIT
window.editPerson = async function(id, oldName, oldBirth) {
  const name = prompt("Nama:", oldName);
  const birth = prompt("Tanggal:", oldBirth);

  if (name) {
    await updateDoc(doc(db, "people", id), {
      name, birth_date: birth
    });

    loadTree();
    loadFatherOptions();
  }
};

// 📥 GET DATA
async function getPeople() {
  const snapshot = await getDocs(collection(db, "people"));
  let people = [];

  snapshot.forEach(doc => {
    people.push({ id: doc.id, ...doc.data() });
  });

  people.sort((a, b) => new Date(a.birth_date) - new Date(b.birth_date));
  return people;
}

// 🌳 BUILD TREE (tetap versi kamu)
function buildTree(people) {
  let map = {}, root = null;

  people.forEach(p => map[p.id] = { ...p, children: [] });

  people.forEach(p => {
    if (p.father_id && map[p.father_id]) {
      map[p.father_id].children.push(map[p.id]);
    } else {
      root = map[p.id];
    }
  });

  function addOrder(node) {
    node.children.forEach((c, i) => {
      c.orderLabel = `Anak ke-${i+1}`;
      addOrder(c);
    });
  }

  if (root) addOrder(root);
  return root;
}

function drawTree(data) {
  const container = document.getElementById("tree");
  container.innerHTML = "";

  const rect = container.getBoundingClientRect();
  const width = rect.width;

  const root = d3.hierarchy(data);

  const nodeCount = root.descendants().length;
  const height = Math.max(600, nodeCount * 100);

  const svg = d3.select("#tree")
    .append("svg")
    .attr("width", width)
    .attr("height", height)
    .call(d3.zoom().scaleExtent([0.5, 2]).on("zoom", (event) => {
      g.attr("transform", event.transform);
    }));

  const g = svg.append("g");

  const treeLayout = d3.tree().size([width - 40, height - 40]);
  treeLayout(root);

  root.descendants().forEach(d => {
    d.x += 20;
    d.y += 20;
  });

  // garis
  g.selectAll("path")
    .data(root.links())
    .enter()
    .append("path")
    .attr("fill", "none")
    .attr("stroke", "#90caf9")
    .attr("stroke-width", 2)
    .attr("d", d => `
      M${d.source.x},${d.source.y}
      C${d.source.x},${(d.source.y + d.target.y)/2}
       ${d.target.x},${(d.source.y + d.target.y)/2}
       ${d.target.x},${d.target.y}
    `);

  const nodes = g.selectAll("g")
    .data(root.descendants())
    .enter()
    .append("g")
    .attr("transform", d => `translate(${d.x}, ${d.y})`);

  const node = nodes.append("g");

  // ✅ FINAL CLICK (lebih simpel & aman)
  node.on("click", (event, d) => {
    event.stopPropagation();

    const isEdit = confirm(`Edit data ${d.data.name}?`);

    if (isEdit) {
      editPerson(d.data.id, d.data.name, d.data.birth_date);
    } else {
      const isDelete = confirm(`Hapus ${d.data.name}?`);
      if (isDelete) {
        deletePerson(d.data.id);
      }
    }
  });

  // kotak
  node.append("rect")
    .attr("x", -60)
    .attr("y", -25)
    .attr("width", 120)
    .attr("height", 50)
    .attr("rx", 10)
    .attr("fill", "#fff")
    .attr("stroke", "#90caf9");

  // nama
  node.append("text")
    .attr("dy", -2)
    .attr("text-anchor", "middle")
    .style("font-weight", "bold")
    .text(d => d.data.name);

  // urutan anak
  node.append("text")
    .attr("dy", 12)
    .attr("text-anchor", "middle")
    .style("font-size", "10px")
    .text(d => d.data.orderLabel || "");

  // animasi
  nodes.style("opacity", 0)
    .transition()
    .duration(500)
    .style("opacity", 1);
}

// dropdown
async function loadFatherOptions() {
  const people = await getPeople();
  const select = document.getElementById("father");

  select.innerHTML = '<option value="">-- Pilih Ayah --</option>';

  people.forEach(p => {
    const o = document.createElement("option");
    o.value = p.id;
    o.text = p.name;
    select.appendChild(o);
  });
}

// load
async function loadTree() {
  const people = await getPeople();
  const treeData = buildTree(people);
  if (treeData) drawTree(treeData);
}

const nameEl = document.getElementById("name");
const birthEl = document.getElementById("birth");
const fatherEl = document.getElementById("father");

loadTree();
loadFatherOptions();

</script>

</body>
</html>
